name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Package Windows release
        run: npm run package:win -- --publish never

      - name: Publish GitHub release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (node -p "require('./package.json').version").Trim()
          $setupSource = "dist\Optimizer Guard Setup $version.exe"
          $setupBlockmapSource = "dist\Optimizer Guard Setup $version.exe.blockmap"
          $portableSource = "dist\Optimizer Guard $version.exe"
          $setupAsset = "dist\Optimizer-Guard-Setup-$version.exe"
          $setupBlockmapAsset = "dist\Optimizer-Guard-Setup-$version.exe.blockmap"
          $portableAsset = "dist\Optimizer-Guard-Portable-$version.exe"

          Copy-Item -LiteralPath $setupSource -Destination $setupAsset -Force
          Copy-Item -LiteralPath $setupBlockmapSource -Destination $setupBlockmapAsset -Force
          Copy-Item -LiteralPath $portableSource -Destination $portableAsset -Force

          gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title "Optimizer Guard $env:GITHUB_REF_NAME" --notes "Windows release build for Optimizer Guard $env:GITHUB_REF_NAME."
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          gh release upload $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY $setupAsset $portableAsset $setupBlockmapAsset --clobber
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: optimizer-guard-win
          path: |
            dist/*.exe
          if-no-files-found: ignore
